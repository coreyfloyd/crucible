version: "1.0"
ticket: "#62"
epic: "none"
title: "Risk-Tiered Review Depth for Build Pipeline Tasks"
date: "2026-03-23"

api_surface:
  - name: "Review-Tier metadata field"
    type: "interface"
    signature: "Review-Tier: 1 | 2 | 3"
    params:
      - name: "tier"
        type: "integer enum (1, 2, 3)"
        required: true
    returns: "N/A (metadata field, not a function)"
    description: "Per-task metadata field computed by the plan writer and consumed by the orchestrator to route review depth"

  - name: "Tier classification algorithm"
    type: "function"
    signature: "classify_tier(files_count, complexity, dependencies, landmine_proximity) -> Tier"
    params:
      - name: "files_count"
        type: "integer"
        required: true
      - name: "complexity"
        type: "enum (Low, Medium, High)"
        required: true
      - name: "dependencies"
        type: "list of task references"
        required: true
      - name: "landmine_proximity"
        type: "boolean"
        required: true
    returns: "Tier (1, 2, or 3)"
    description: "Deterministic classification of a task's review tier from existing plan metadata plus cartographer landmine proximity"

  - name: "Tier routing table"
    type: "interface"
    signature: "route_review_steps(tier) -> list of review steps"
    params:
      - name: "tier"
        type: "integer enum (1, 2, 3)"
        required: true
    returns: "Ordered list of review steps to execute for this task"
    description: "Maps a review tier to the set of Phase 3 review steps that execute for that task"

invariants:
  checkable:
    - id: "INV-1"
      description: "Plan writer prompt template includes Review-Tier in the per-task metadata block"
      verification: "The string 'Review-Tier' appears in the metadata example block of skills/build/plan-writer-prompt.md"
      check_method: "grep"

    - id: "INV-2"
      description: "Plan reviewer prompt template includes tier validation in its checklist"
      verification: "The string 'Review-Tier' or 'tier' appears in the Task Quality checklist section of skills/build/plan-reviewer-prompt.md"
      check_method: "grep"

    - id: "INV-3"
      description: "SKILL.md contains a tier routing table mapping tiers to review steps"
      verification: "A markdown table with columns for Tier 1, Tier 2, Tier 3 and rows for review steps exists in the Phase 3 section of skills/build/SKILL.md"
      check_method: "code-inspection"

    - id: "INV-4"
      description: "Phase 4 completion gates are not modified by the tier system"
      verification: "The Phase 4 section of skills/build/SKILL.md contains no references to Review-Tier, tier routing, or conditional step execution based on tiers"
      check_method: "grep"

    - id: "INV-5"
      description: "Tier classification is deterministic -- no discretionary language in tier assignment rules"
      verification: "The tier classification rules in plan-writer-prompt.md use only deterministic criteria (file count, complexity enum, dependency type, landmine boolean) with no 'lead decides' or 'use judgment' language for the tier assignment itself"
      check_method: "code-inspection"

    - id: "INV-6"
      description: "No new files are created -- changes are limited to existing skill files"
      verification: "Only skills/build/SKILL.md, skills/build/plan-writer-prompt.md, and skills/build/plan-reviewer-prompt.md are modified"
      check_method: "file-structure"

    - id: "INV-7"
      description: "Tier 1 skips test quality review, test alignment audit, test gap writer, and adversarial tester"
      verification: "The tier routing table in SKILL.md shows SKIP for Pass 2, test alignment audit, test gap writer, and adversarial tester in the Tier 1 column"
      check_method: "code-inspection"

    - id: "INV-8"
      description: "Tier 2 skips test alignment audit and test gap writer but includes adversarial tester"
      verification: "The tier routing table in SKILL.md shows SKIP for test alignment audit and test gap writer in the Tier 2 column, and Yes for adversarial tester"
      check_method: "code-inspection"

    - id: "INV-9"
      description: "Tier 3 pipeline is identical to the current full pipeline"
      verification: "The tier routing table in SKILL.md shows Yes for all steps in the Tier 3 column"
      check_method: "code-inspection"

    - id: "INV-10"
      description: "Runtime tier escalation is one-directional (up only)"
      verification: "The runtime escalation section in SKILL.md specifies escalation is one-directional and describes only upward transitions (T1->T2, T1->T3, T2->T3)"
      check_method: "code-inspection"

    - id: "INV-11"
      description: "Decision journal includes review-tier decision type"
      verification: "The string 'review-tier' appears in the Pipeline Decision Journal section of skills/build/SKILL.md"
      check_method: "grep"

    - id: "INV-12"
      description: "Cartographer landmine proximity forces Tier 3"
      verification: "The tier classification rules state that cartographer landmine proximity results in Tier 3 (not Tier 2)"
      check_method: "code-inspection"

  testable:
    - id: "INV-13"
      description: "Tier classification algorithm produces correct tier for a Low-complexity, 2-file task with no cross-system deps and no landmines"
      verification: "Given files_count=2, complexity=Low, dependencies=none, landmine_proximity=false, the result is Tier 1"
      test_tag: "contract:classification:inv-13"

    - id: "INV-14"
      description: "Tier classification algorithm escalates a Low-complexity task to Tier 3 when landmine proximity is true"
      verification: "Given files_count=2, complexity=Low, dependencies=none, landmine_proximity=true, the result is Tier 3"
      test_tag: "contract:classification:inv-14"

    - id: "INV-15"
      description: "Tier classification algorithm produces Tier 2 for a Medium-complexity, 4-file task with single-system deps"
      verification: "Given files_count=4, complexity=Medium, dependencies=single-system, landmine_proximity=false, the result is Tier 2"
      test_tag: "contract:classification:inv-15"

    - id: "INV-16"
      description: "Tier classification algorithm escalates Medium-complexity to Tier 3 for cross-system dependencies"
      verification: "Given files_count=4, complexity=Medium, dependencies=cross-system, landmine_proximity=false, the result is Tier 3"
      test_tag: "contract:classification:inv-16"

integration_points: []
  # No cross-ticket dependencies. This feature modifies internal build pipeline
  # routing and does not consume or produce interfaces used by other tickets.

ambiguity_resolutions:
  - id: "AMB-1"
    decision: "Tier 1 retains de-sloppify cleanup"
    confidence: "high"
    alternatives:
      - "Skip cleanup for Tier 1 tasks entirely"
      - "Make cleanup conditional on file count (skip for 1-file tasks)"
    reasoning: "Cleanup is cheap (single agent, bounded scope, fast 'no cleanup needed' path) and catches debug logging and commented-out code that even trivial tasks produce. The cost-to-benefit ratio favors always running it."
    reversibility: "Low -- removing cleanup from Tier 1 is a one-line routing table change"

  - id: "AMB-2"
    decision: "Tier 2 test review is single-pass non-iterative rather than fully skipped"
    confidence: "high"
    alternatives:
      - "Skip test review entirely for Tier 2"
      - "Full iterative test review for Tier 2 (same as Tier 3)"
    reasoning: "Medium-complexity tasks (3-6 files, some cross-system interaction) benefit from a test quality sanity check, but the iterative loop is the expensive part. A single pass catches obvious issues while avoiding 2-3 additional reviewer dispatches. Critical findings trigger escalation to Tier 3."
    reversibility: "Low -- changing single-pass to iterative or skip is a routing table change"

  - id: "AMB-3"
    decision: "Landmine proximity forces Tier 3 (not minimum Tier 2)"
    confidence: "high"
    alternatives:
      - "Landmine proximity forces minimum Tier 2"
      - "Landmine proximity is advisory (logged but does not change tier)"
    reasoning: "Landmines represent historically problematic areas. Under-reviewing landmine-adjacent code risks repeating past failures. Over-reviewing is cheap compared to missing a defect in a known trouble spot."
    reversibility: "Low -- relaxing to Tier 2 minimum is a one-line rule change"

  - id: "AMB-4"
    decision: "Tier is computed by plan writer, not orchestrator"
    confidence: "high"
    alternatives:
      - "Orchestrator computes tier at dispatch time from plan metadata"
      - "Separate tier-classification agent reviews the plan"
    reasoning: "Plan writer already has all inputs (file count, complexity, dependencies). Plan reviewer already validates metadata. Adding Review-Tier is a natural extension. Orchestrator-side computation would add complexity to the lead agent, which should stay thin (SKILL.md line 688)."
    reversibility: "Medium -- moving classification to orchestrator requires removing it from plan-writer-prompt and adding logic to SKILL.md dispatch section"

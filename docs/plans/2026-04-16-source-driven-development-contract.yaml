epic: "#177"
title: "Source-driven development skill"
date: "2026-04-16"
source: "spec"
api_surface:
  - name: "source-driven-development"
    type: "interface"
    signature: "Skill invocation: /source-driven-development [--framework <name>] [--url <url>]"
    params:
      - name: "framework"
        type: "string"
        required: false
      - name: "url"
        type: "string"
        required: false
    description: "Skill that enforces Detect → Fetch → Implement → Cite protocol"
  - name: "build-integration-hook"
    type: "interface"
    signature: "Injection point in skills/build/build-implementer-prompt.md"
    params: []
    description: "Hook that invokes source-driven-development when external API usage detected"
invariants:
  checkable:
    - id: "INV-1"
      description: "Skill file exists at skills/source-driven-development/SKILL.md"
      verification: "test -f skills/source-driven-development/SKILL.md"
      check_method: "file-structure"
    - id: "INV-2"
      description: "/build implementer prompt references source-driven-development"
      verification: "grep -q 'source-driven-development' skills/build/build-implementer-prompt.md"
      check_method: "grep"
  testable:
    - id: "INV-3"
      description: "When an eval prompt requires external API usage, expected_skill set includes source-driven-development"
      verification: "Skill selection eval positive case — expected_skill includes source-driven-development"
      test_tag: "contract:routing:inv-3"
    - id: "INV-4"
      description: "Negative: pure internal-refactor prompts — expected_skill set excludes source-driven-development"
      verification: "Skill selection eval negative case — expected_skill excludes source-driven-development"
      test_tag: "contract:routing:inv-4"
    - id: "INV-5"
      description: "When source-driven-development runs on a change introducing a new external API, the resulting diff contains a citation (commit footer `Source: <url> (YYYY-MM-DD)` OR inline comment with URL+date) above the new call site"
      verification: "Post-skill diff inspection. Authoritative ERE regex (runs under portable grep -E and BSD grep): `Source: https?://[^ ]+ \\([0-9]{4}-[0-9]{2}-[0-9]{2}\\)`. Equivalent PCRE (grep -P / ripgrep): `Source: https?://\\S+ \\(\\d{4}-\\d{2}-\\d{2}\\)`. Use ERE form for CI — `\\d` is PCRE-only and silently matches nothing under grep -E."
      test_tag: "contract:citation:inv-5"
integration_points:
  - contract: "2026-04-16-anti-rationalization-tables-contract.yaml"
    ticket: "#176"
    relationship: "adjacent"
    surface: "skills/build/SKILL.md + build-implementer-prompt.md"
    notes: "Both tickets edit /build prompt surfaces; merge #176 first so #177's citation rule can reference anti-rat rows"
  - contract: "2026-04-16-noticed-but-not-touching-contract.yaml"
    ticket: "#179"
    relationship: "adjacent"
    surface: "skills/build/SKILL.md"
    notes: "Also edits /build SKILL.md — coordinate section placement"
  - contract: "2026-04-16-context-trust-hierarchy-contract.yaml"
    ticket: "#180"
    relationship: "adjacent"
    surface: "skills/build/SKILL.md + skills/source-driven-development/SKILL.md"
    notes: "WebFetch results are classified L4 (Verify-first) by #180. The SDD skill's citation + implement-from-source protocol IS the verify-before-use duty. SDD SKILL.md must carry an L4 TRUST marker on the WebFetch step and cross-reference getting-started/trust-hierarchy.md."
  - file: ".claude/settings.local.json"
    relationship: "modified"
    surface: "permissions.allow list"
    notes: "T3 must extend WebFetch(domain:…) allow list; currently only github.com is granted"
security_review:
  status: "recommended"
  signals_detected:
    - category: "external_input"
      evidence: "skill fetches external web content via WebFetch; content is ingested into agent context"
    - category: "dependencies"
      evidence: "skill introduces implicit trust in external docs domains"
  deployment_context: "public"
ambiguity_resolutions:
  - id: "AMB-1"
    decision: "Both standalone skill + /build integration hook"
    confidence: "medium"
    alternatives: ["standalone only", "/build phase only"]
    reasoning: "Maximizes coverage (build + debug + migrate) while retaining invocation flexibility"
    reversibility: "high — integration hook can be removed without deleting the skill"

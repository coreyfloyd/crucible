version: "1.0"
ticket: "#178"
epic: "#178"
title: "Simplify-ignore hook for protected code regions"
date: "2026-04-16"
source: "spec"

api_surface:
  - name: "simplify-ignore-start / simplify-ignore-end markers"
    type: "interface"
    signature: |
      // simplify-ignore-start
        <protected code>
      // simplify-ignore-end                              (JS/TS/Java/C-like)
      /* simplify-ignore-start */ ... /* simplify-ignore-end */   (CSS)
      <!-- simplify-ignore-start --> ... <!-- simplify-ignore-end -->  (HTML/XML)
      # simplify-ignore-start ... # simplify-ignore-end   (shell/python/yaml)
    params:
      - name: "comment_style"
        type: "enum [//, /*, <!--, #]"
        required: true
    description: >
      Line-level markers that delimit code ranges excluded from simplify-skill scope.
      Markers must appear on their own line (indentation allowed); trailing explanatory
      text after the marker keyword is permitted.

invariants:
  checkable:
    - id: "INV-1"
      description: "simplify skill scans for markers before subagent dispatch"
      verification: "grep -q 'simplify-ignore' skills/simplify/SKILL.md"
      check_method: "grep"
    - id: "INV-2"
      description: "simplify subagent prompt declares protected_ranges"
      verification: "grep -q 'protected_ranges' skills/simplify/SKILL.md"
      check_method: "grep"
  testable:
    - id: "INV-3"
      description: "Fixture file with marked protected range survives simplify pass unchanged"
      verification: "Integration test — file with markers → simplify skill → assert byte-equal inside markers"
      test_tag: "contract:integration:inv-3"
    - id: "INV-4"
      description: "Diff containing changes inside a marked range is rejected by validation"
      verification: "Unit test — feed diff that touches protected line → assert rejection"
      test_tag: "contract:validation:inv-4"
    - id: "INV-5"
      description: "Malformed markers (unclosed start, orphan end) emit a warning diagnostic"
      verification: "Unit test — fixture with unclosed start → assert warning in pre-scan output"
      test_tag: "contract:validation:inv-5"

integration_points: []

acceptance_criteria:
  - ac: "AC-1: Marked blocks survive simplification passes unchanged"
    invariants: ["INV-1", "INV-2", "INV-3", "INV-4"]
  - ac: "AC-2: Multi-syntax comment support (JS, HTML, CSS, shell/Python/YAML)"
    invariants: ["INV-1"]
    note: "Covered by T4 marker-syntax-coverage fixtures (one per language family)"
  - ac: "AC-3: Atomic backup/restore — no data loss on crash"
    invariants: []
    note: >
      Vacuously satisfied under Option B: protected regions are never rewritten, so no
      backup/restore mechanism is required. If upgraded to Option A, this AC activates
      and requires atomic-lock + restore invariants to be added.
  - ac: "AC-4: Warning diagnostics for malformed markers"
    invariants: ["INV-5"]

ambiguity_resolutions:
  - id: "AMB-1"
    decision: "Option B (skill-level marker respect) for MVP; Option A (PreToolUse hook) as documented follow-up"
    confidence: "medium"
    alternatives:
      - "Option A PreToolUse + PostToolUse placeholder-substitution hook (~200 lines)"
      - "Option C dispatch-manifest trust with no validation"
    reasoning: >
      Low priority ticket; 200-line hook infrastructure with atomic locking and
      backup/restore unjustified until the failure is observed in practice. Option B
      delivers all four acceptance criteria inside the simplify skill without a
      file-rewriting hook. Reversibility is high — Option A is purely additive.
    reversibility: "high — upgrade to Option A is additive; markers and semantics unchanged"

  - id: "AMB-2"
    decision: "Line-level markers only; no top-of-file `simplify-ignore-file` directive in MVP"
    confidence: "high"
    alternatives:
      - "Add `simplify-ignore-file` directive"
      - ".simplifyignore glob file analogous to .gitignore"
    reasoning: >
      Range-level markers cover the stated motivating cases (state machines, parsers,
      hand-tuned hot loops). File-level and glob-level can be added later without
      breaking the range marker contract.
    reversibility: "high"

  - id: "AMB-3"
    decision: "Rename-through-simplify is out of scope for MVP; protected ranges do not track across file renames"
    confidence: "high"
    alternatives:
      - "Detect renames in subagent diff and remap protected ranges"
    reasoning: >
      Rare edge case; simplifier rarely renames files. Documented as a known limitation.
    reversibility: "high"

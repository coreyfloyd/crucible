ambiguity_resolutions:
  - id: "AMB-1"
    decision: "Continuous logging via PostToolUse hook, not pre-compaction snapshot"
    confidence: "high"
    alternatives: ["PreCompact hook snapshot", "Periodic timer-based snapshot"]
    reasoning: "Auto-compaction does not fire PreCompact hooks. Timer-based requires a daemon. PostToolUse fires on every tool use, ensuring the index is always current regardless of which compaction layer fires."
    reversibility: "Low — switching to snapshot-based would miss all inter-snapshot events"

  - id: "AMB-2"
    decision: "JSONL for event storage, not SQLite"
    confidence: "high"
    alternatives: ["SQLite database", "Flat markdown log"]
    reasoning: "JSONL is append-only (crash-safe), grep-searchable, parseable by shell scripts, and matches existing manifest.jsonl pattern. No binary dependencies."
    reversibility: "Medium — migration would require a conversion script"

  - id: "AMB-3"
    decision: "Outbox pattern for skill-emitted semantic events"
    confidence: "medium"
    alternatives: ["Direct Bash append to events.jsonl", "Skills call a helper script", "MCP server for event ingestion"]
    reasoning: "Safety hooks block Bash access to .claude/ paths. Write tool can write to outbox.jsonl. The hook drains on next invocation. Latency is acceptable (events appear within one tool use). MCP server violates the no-external-services principle."
    reversibility: "High — could switch to direct append if safety hook constraint changes"

  - id: "AMB-4"
    decision: "Opt-in hook configuration, not auto-installed"
    confidence: "high"
    alternatives: ["Auto-install hook via CLAUDE.md directive", "Install as part of crucible setup"]
    reasoning: "Hooks modify Claude Code's behavior globally for the project. Auto-installation is surprising and may conflict with user's existing hooks. Opt-in respects user agency. Documentation makes setup trivial."
    reversibility: "High — could auto-install in a future version"

  - id: "AMB-5"
    decision: "7-day retention for session index directories"
    confidence: "medium"
    alternatives: ["24 hours", "30 days", "Never auto-delete"]
    reasoning: "Sessions rarely span more than a few days. 7 days provides comfortable buffer for multi-day work. 30 days risks accumulating gigabytes on active projects. Never-delete requires manual cleanup."
    reversibility: "High — retention period is a single constant"

  - id: "AMB-6"
    decision: "PostCompact recovery reads summary.md (supplementary), not events.jsonl (authoritative)"
    confidence: "high"
    alternatives: ["Inject last N events from events.jsonl into context", "Replay full event stream"]
    reasoning: "Post-compaction context is precious. summary.md is pre-condensed to ~2000 tokens. Injecting raw events would consume unpredictable context. The summary provides narrative while the CSB provides authoritative state."
    reversibility: "Medium — switching to raw events requires careful token budgeting"

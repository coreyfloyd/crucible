version: "1.0"
ticket: "#179"
epic: "#179"
title: "'Noticed but not touching' scope discipline pattern"
date: "2026-04-16"

api_surface:
  - name: "Noticed But Not Touching (report format)"
    type: "interface"
    signature: "### Noticed But Not Touching\n\n- **file:** `path:L<start>-L<end>`\n  **noticed:** <desc>\n  **why it matters:** <risk/opportunity>\n  **suggested follow-up:** <optional>"
    params:
      - name: "file_path_with_line_range"
        type: "string"
        required: true
      - name: "noticed"
        type: "prose"
        required: true
      - name: "why_it_matters"
        type: "prose"
        required: true
      - name: "suggested_follow_up"
        type: "prose"
        required: false
    description: "Structured entry for out-of-scope observations surfaced during implementation. Appears as a required section in every build implementer report. If no observations, implementer writes `*(none)*`."

  - name: "docs/plans/<YYYY-MM-DD>-<ticket-slug>-noticed.md"
    type: "interface"
    signature: "Markdown file containing aggregated Noticed entries from all implementers in a /build pipeline. Filename uses date + ticket-slug (matching sibling design/plan/contract artifacts); pipeline_id is recorded in the file's frontmatter."
    params: []
    description: "Per-pipeline artifact written by the build orchestrator after implementer reconciliation. Committed with the PR. Skipped if zero entries across all implementers. Frontmatter fields: pipeline_id, date, ticket."

invariants:
  checkable:
    - id: "INV-1"
      description: "/build implementer prompt template contains the 'Noticed But Not Touching' section as a level-3 heading"
      verification: "grep -qE '^### Noticed But Not Touching$' skills/build/build-implementer-prompt.md"
      check_method: "grep"
    - id: "INV-2"
      description: "/build SKILL.md documents the noticed.md reconciliation step under a heading"
      verification: "grep -qE '^#+ .*[Nn]oticed [Rr]econciliation' skills/build/SKILL.md && grep -qE '[-]noticed\\.md' skills/build/SKILL.md"
      check_method: "grep"
    - id: "INV-5"
      description: "/finish SKILL.md references noticed.md via the canonical filename pattern"
      verification: "grep -qE '[-]noticed\\.md' skills/finish/SKILL.md"
      check_method: "grep"
    - id: "INV-6"
      description: "Canonical noticed filename regex is specified in the plan so writer (T2) and readers (T4, /finish) share one pattern"
      verification: "grep -qE '\\^docs/plans/\\\\d\\{4\\}-\\\\d\\{2\\}-\\\\d\\{2\\}-\\[a-z0-9-\\]\\+-noticed' docs/plans/2026-04-16-noticed-but-not-touching-implementation-plan.md"
      check_method: "grep"

  testable:
    - id: "INV-3"
      description: "A live implementer agent given a task plan plus a fixture containing a clearly out-of-scope bug writes a Noticed entry referencing that file AND does not modify the file (sha256 unchanged pre/post)"
      verification: "Behavioral eval (T6): dispatch real implementer agent against fixture, assert Noticed entry present AND sha256(out_of_scope_file) unchanged pre/post. Stubbed implementers cannot verify this invariant — must be a live dispatch."
      test_tag: "contract:scope-discipline:inv-3"
    - id: "INV-4"
      description: "Reconciliation aggregates and dedupes Noticed entries across multiple implementer reports into a single docs/plans/<date>-<slug>-noticed.md with sorted, deduped entries and correct frontmatter"
      verification: "Mechanical contract test (T4): feed 2 synthetic reports (1 duplicate entry, 1 unique) into reconciliation; assert output file path uses <date>-<slug>-noticed.md format, contains exactly 2 entries, sorted by file path then line range, frontmatter has pipeline_id/date/ticket."
      test_tag: "contract:integration:inv-4"


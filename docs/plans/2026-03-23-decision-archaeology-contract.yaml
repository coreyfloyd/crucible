version: "1.0"
ticket: "#63"
epic: "none"
title: "Decision Archaeology Log in Cartographer"
date: "2026-03-23"

api_surface:
  - name: "Key Decisions section"
    type: "interface"
    signature: "## Key Decisions — new section in cartographer module files (modules/<name>.md)"
    params:
      - name: "decision_title"
        type: "string"
        required: true
      - name: "date"
        type: "ISO date string"
        required: true
      - name: "source_ticket"
        type: "string (#NNN format)"
        required: true
      - name: "confidence"
        type: "string (high|medium|low) — omit if high"
        required: false
      - name: "alternatives"
        type: "list of {name, rejection_reason}"
        required: true
      - name: "evidence"
        type: "string"
        required: true
    description: "Per-module decision entries within existing cartographer module files, between Contracts and Gotchas sections"

  - name: "decisions.md"
    type: "interface"
    signature: "cartographer/decisions.md — cross-cutting decisions file (max 200 lines)"
    params:
      - name: "decision_title"
        type: "string"
        required: true
      - name: "date"
        type: "ISO date string"
        required: true
      - name: "source_ticket"
        type: "string (#NNN format)"
        required: true
      - name: "modules"
        type: "list of cartographer module names"
        required: true
      - name: "confidence"
        type: "string (high|medium|low) — omit if high"
        required: false
      - name: "alternatives"
        type: "list of {name, rejection_reason}"
        required: true
      - name: "evidence"
        type: "string"
        required: true
    description: "Cross-cutting design decisions that span multiple modules or are architectural in nature"

  - name: "Decision Extraction Recording mode"
    type: "interface"
    signature: "New mode in recorder-prompt.md triggered by directive 'Extract decisions for cartographer'"
    params:
      - name: "decision_source"
        type: "string (contents of spec decisions.md or build decision journal)"
        required: true
      - name: "module_mapping"
        type: "list of {module_name, path_prefix}"
        required: true
      - name: "existing_module_files"
        type: "map of module_name to file content"
        required: true
      - name: "existing_decisions_md"
        type: "string (current content, or empty if first extraction)"
        required: false
    description: "Recorder prompt mode that extracts substantive design decisions from spec or build outputs and writes them to cartographer storage"

  - name: "Spec post-completion extraction hook"
    type: "function"
    signature: "Step [10] in spec orchestration flow — dispatches cartographer recorder after final wave"
    params:
      - name: "scratch_decisions_md"
        type: "string (contents of scratch/<run-id>/decisions.md)"
        required: true
      - name: "per_ticket_decisions"
        type: "map of ticket_number to decisions.md content"
        required: true
      - name: "design_doc_file_paths"
        type: "list of file paths referenced in design docs"
        required: true
    returns: "void — writes to cartographer storage via recorder dispatch"
    description: "Extracts decisions from spec scratch directory and persists them to cartographer before scratch cleanup"

  - name: "Forge build decision extraction hook"
    type: "function"
    signature: "Step 7 in forge retrospective — extracts substantive design decisions from build sessions"
    params:
      - name: "decision_journal"
        type: "string (contents of /tmp/crucible-decisions-<session-id>.log)"
        required: true
      - name: "execution_summary"
        type: "string (actual execution summary from retrospective input)"
        required: true
    returns: "list of substantive decisions (filtered: excludes operational routing decisions)"
    description: "Filters build decision journal to extract design-level decisions, passes to cartographer recorder"

invariants:
  checkable:
    - id: "INV-1"
      description: "Module file template in SKILL.md includes ## Key Decisions section between ## Contracts and ## Gotchas"
      verification: "Grep for '## Key Decisions' in skills/cartographer-skill/SKILL.md module file format section, verify it appears after '## Contracts' and before '## Gotchas'"
      check_method: "grep"

    - id: "INV-2"
      description: "decisions.md is listed in the cartographer storage structure with 200-line cap"
      verification: "Grep for 'decisions.md' in skills/cartographer-skill/SKILL.md storage section, verify max line cap is 200"
      check_method: "grep"

    - id: "INV-3"
      description: "Recorder prompt contains Decision Extraction Recording section"
      verification: "Grep for 'Decision Extraction Recording' in skills/cartographer-skill/recorder-prompt.md"
      check_method: "grep"

    - id: "INV-4"
      description: "Subagent loading table includes decisions.md column with Yes for Implementer, Code Reviewer, and Red-Team"
      verification: "Read the subagent loading table in skills/cartographer-skill/SKILL.md and verify decisions.md column values"
      check_method: "code-inspection"

    - id: "INV-5"
      description: "Spec orchestration flow includes decision extraction step after final wave completes"
      verification: "Read skills/spec/SKILL.md orchestration flow and verify a step dispatches cartographer recorder with decision extraction directive"
      check_method: "code-inspection"

    - id: "INV-6"
      description: "Forge retrospective includes substantive design decision extraction for build sessions"
      verification: "Read skills/forge-skill/SKILL.md retrospective mode and verify step 7 extracts design decisions from decision journal"
      check_method: "code-inspection"

    - id: "INV-7"
      description: "No new skill files, modes, or subagent types are created"
      verification: "Verify no new files are added to skills/ directory. Verify no new entries in any skill's 'Three modes' or subagent type listings."
      check_method: "file-structure"

    - id: "INV-8"
      description: "Module files remain under 100-line cap with Key Decisions section"
      verification: "Verify recorder prompt includes compression/overflow rules for Key Decisions entries when module file approaches 100 lines"
      check_method: "code-inspection"

    - id: "INV-9"
      description: "Decision entries require at least one rejected alternative with reasoning"
      verification: "Grep for 'alternative' in both the module file format and recorder prompt extraction rules; verify the requirement is stated"
      check_method: "grep"

    - id: "INV-10"
      description: "Recorder prompt decision extraction criteria explicitly exclude operational routing decisions"
      verification: "Read recorder-prompt.md Decision Extraction section and verify 'Do NOT persist' list includes routing/operational decision types"
      check_method: "code-inspection"

  testable:
    - id: "INV-11"
      description: "A cartographer module file with a Key Decisions section is loaded in its entirety during load mode, making decisions available to subagents"
      verification: "Create a test module file with Key Decisions section, simulate load mode dispatch, verify the decision text appears in the subagent prompt"
      test_tag: "contract:integration:inv-11"

    - id: "INV-12"
      description: "Spec extraction hook reads decisions from scratch directory and dispatches cartographer recorder"
      verification: "Run a spec session with 1+ medium-confidence decisions, verify cartographer module files are updated with decision entries after the run completes"
      test_tag: "contract:e2e:inv-12"

    - id: "INV-13"
      description: "Cross-cutting decisions.md is loaded for implementer subagents alongside conventions.md"
      verification: "Create a decisions.md file, dispatch an implementer subagent, verify decisions.md content appears in the dispatch prompt"
      test_tag: "contract:integration:inv-13"

integration_points: []

ambiguity_resolutions:
  - id: "AMB-1"
    decision: "New section in existing module files rather than separate per-module decision files"
    confidence: "high"
    alternatives:
      - "Separate modules/<name>.decisions.md files"
      - "Append decisions to ## Gotchas section"
    reasoning: "Module files are already loaded in entirety during load mode. A new section requires zero dispatch-logic changes. Separate files double the file count and require load-mode updates. Gotchas and decisions are semantically distinct (surprise vs. justification)."
    reversibility: "High -- section can be migrated to separate files by splitting module files, with a recorder prompt update"

  - id: "AMB-2"
    decision: "Cross-cutting decisions in new decisions.md file rather than expanding map.md"
    confidence: "high"
    alternatives:
      - "Expand map.md Key Architectural Decisions section"
      - "Put cross-cutting decisions in conventions.md"
    reasoning: "map.md is loaded by orchestrator on every consult (context cost). conventions.md describes patterns, not justifications. A dedicated file keeps the orchestrator thin while giving subagents access to rationale."
    reversibility: "High -- file contents can be merged into map.md or conventions.md with a one-time migration"

  - id: "AMB-3"
    decision: "Extend existing recorder prompt rather than creating a new Decision Archaeologist subagent"
    confidence: "high"
    alternatives:
      - "New dedicated Decision Archaeologist subagent type"
      - "Direct writes by orchestrator without subagent"
    reasoning: "Recorder prompt already handles multiple input types (exploration, defect signatures). Adding a mode follows the established pattern. A new subagent type increases dispatch complexity. Direct writes lack the judgment needed for extraction and compression."
    reversibility: "Medium -- extracting to a separate subagent requires moving prompt content and adding a new dispatch path"

  - id: "AMB-4"
    decision: "Extract spec decisions immediately after final wave, not during scratch cleanup"
    confidence: "high"
    alternatives:
      - "Extract at scratch cleanup time (24-hour mark)"
      - "Extract during forge retrospective only"
    reasoning: "Cleanup runs at start of next run which may be for a different epic. Forge retrospective is not guaranteed to run after every spec session. Immediate extraction preserves full context (module mappings, dependency graph) for accurate module assignment."
    reversibility: "High -- extraction timing can be moved to any other point with no storage format changes"

  - id: "AMB-5"
    decision: "Implementers, reviewers, and red-team get decisions.md; investigators and plan writers do not"
    confidence: "medium"
    alternatives:
      - "All subagent types receive decisions.md"
      - "Only implementers receive decisions.md"
    reasoning: "Implementers need decisions to avoid re-litigation. Reviewers need them to distinguish intentional constraints from accidents. Red-team needs them to test whether choices hold under adversarial conditions. Investigators explore unknowns where prior decisions may bias. Plan writers create new plans where prior decisions may anchor."
    reversibility: "High -- adding decisions.md to additional subagent types is a one-line table change"

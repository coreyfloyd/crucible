version: "1.0"
ticket: "#65"
epic: "none"
title: "/migrate Skill for Autonomous Migration Planning and Execution"
date: "2026-03-23"

api_surface:
  - name: "migrate"
    type: "interface"
    signature: "crucible:migrate <migration-description> [--plan-only] [--execute <plan-path>] [--orgs <org1,org2>]"
    params:
      - name: "migration-description"
        type: "string"
        required: true
      - name: "--plan-only"
        type: "flag"
        required: false
      - name: "--execute"
        type: "file-path"
        required: false
      - name: "--orgs"
        type: "comma-separated-string"
        required: false
    returns: "Migration plan artifact + optional execution results"
    description: "Top-level skill invocation. Analyzes a migration target, produces a phased plan, and optionally executes via build."

  - name: "MigrationAnalysis"
    type: "interface"
    signature: "Phase 1 output: structured migration analysis document"
    params:
      - name: "migration_description"
        type: "string"
        required: true
      - name: "framework_context"
        type: "string"
        required: false
      - name: "cartographer_data"
        type: "string"
        required: false
    returns: "MigrationAnalysisDoc"
    description: "Phase 1 agent output: API delta, breaking changes, complexity assessment."

  - name: "BlastRadiusReport"
    type: "interface"
    signature: "Phase 2 output: impact manifest + consumer registry"
    params:
      - name: "migration_analysis"
        type: "MigrationAnalysisDoc"
        required: true
      - name: "cartographer_modules"
        type: "string"
        required: false
      - name: "pathfinder_topology"
        type: "string"
        required: false
    returns: "ImpactManifest + ConsumerRegistry"
    description: "Phase 2 agent output: all affected consumers with usage patterns, complexity, and independence flags."

  - name: "PhasePlan"
    type: "interface"
    signature: "Phase 3 output: ordered migration phases"
    params:
      - name: "migration_analysis"
        type: "MigrationAnalysisDoc"
        required: true
      - name: "blast_radius"
        type: "ImpactManifest + ConsumerRegistry"
        required: true
    returns: "OrderedPhaseList"
    description: "Phase 3 agent output: ordered phases each satisfying the safe stopping point invariant."

  - name: "CompatibilitySpec"
    type: "interface"
    signature: "Phase 4 output: shim/adapter specification"
    params:
      - name: "migration_analysis"
        type: "MigrationAnalysisDoc"
        required: true
      - name: "phase_plan"
        type: "OrderedPhaseList"
        required: true
    returns: "CompatibilityLayerSpec"
    description: "Phase 4 agent output: per-shim interface, mapping, direction, test requirements, and removal criteria. Skipped when no coexistence period needed."

  - name: "WavePlan"
    type: "interface"
    signature: "Phase 5 output: consumer wave assignments"
    params:
      - name: "consumer_registry"
        type: "ConsumerRegistry"
        required: true
      - name: "phase_plan"
        type: "OrderedPhaseList"
        required: true
    returns: "WaveAssignmentList"
    description: "Phase 5 agent output: consumers grouped into waves by topological sort of dependency graph."

  - name: "MigrationPlan"
    type: "interface"
    signature: "Consolidated plan presented at user gate"
    params:
      - name: "phase_plan"
        type: "OrderedPhaseList"
        required: true
      - name: "compatibility_spec"
        type: "CompatibilityLayerSpec"
        required: false
      - name: "wave_plan"
        type: "WaveAssignmentList"
        required: true
      - name: "rollback_points"
        type: "RollbackDefinitions"
        required: true
    returns: "ConsolidatedMigrationPlan"
    description: "User-facing consolidated plan saved to docs/plans/. Must be approved before execution."

invariants:
  checkable:
    - id: "INV-1"
      description: "SKILL.md must exist at skills/migrate/SKILL.md with rigid skill type declaration"
      verification: "File exists and contains 'Skill type: Rigid'"
      check_method: "file-structure"

    - id: "INV-2"
      description: "All five prompt templates must exist in skills/migrate/"
      verification: "Files exist: migration-analyzer-prompt.md, blast-radius-mapper-prompt.md, phase-planner-prompt.md, compatibility-designer-prompt.md, wave-grouper-prompt.md"
      check_method: "file-structure"

    - id: "INV-3"
      description: "SKILL.md must reference cartographer consult mode in Phase 0"
      verification: "SKILL.md contains 'crucible:cartographer' in the Phase 0 or pre-flight section"
      check_method: "grep"

    - id: "INV-4"
      description: "SKILL.md must reference pathfinder query mode in Phase 2"
      verification: "SKILL.md contains 'crucible:pathfinder' and 'query' in the Phase 2 section"
      check_method: "grep"

    - id: "INV-5"
      description: "SKILL.md must reference build refactor mode for execution phases"
      verification: "SKILL.md contains 'crucible:build' and 'refactor mode' in the Phase 7 section"
      check_method: "grep"

    - id: "INV-6"
      description: "SKILL.md must reference quality-gate for per-phase verification"
      verification: "SKILL.md contains 'crucible:quality-gate' in the execution or Phase 7 section"
      check_method: "grep"

    - id: "INV-7"
      description: "SKILL.md must reference test-coverage for per-phase test alignment"
      verification: "SKILL.md contains 'crucible:test-coverage' in the execution or Phase 7 section"
      check_method: "grep"

    - id: "INV-8"
      description: "SKILL.md must define a user gate between planning and execution"
      verification: "SKILL.md contains 'USER GATE' or 'user gate' between Phase 5 and Phase 7 sections"
      check_method: "grep"

    - id: "INV-9"
      description: "SKILL.md must define the safe stopping point invariant"
      verification: "SKILL.md contains 'safe stopping point' and describes the invariant (compiles, tests pass, old and new coexist)"
      check_method: "code-inspection"

    - id: "INV-10"
      description: "SKILL.md must define a scratch directory for state persistence"
      verification: "SKILL.md contains 'memory/migrate/scratch' path specification"
      check_method: "grep"

    - id: "INV-11"
      description: "SKILL.md must define compaction recovery procedure"
      verification: "SKILL.md contains a compaction recovery section that reads state from scratch directory"
      check_method: "code-inspection"

    - id: "INV-12"
      description: "SKILL.md must not implement its own execution engine -- must delegate to build"
      verification: "Phase 7 (execution) dispatches crucible:build, does not contain implementer dispatches or direct code modification instructions"
      check_method: "code-inspection"

    - id: "INV-13"
      description: "SKILL.md communication requirement must follow the standard pattern"
      verification: "Contains 'Between every agent dispatch and every agent completion, output a status update' (matching build and prospector pattern)"
      check_method: "grep"

    - id: "INV-14"
      description: "SKILL.md must define rollback points per phase"
      verification: "Contains a rollback section that specifies per-phase rollback trigger, scope, and verification"
      check_method: "code-inspection"

    - id: "INV-15"
      description: "SKILL.md must handle --plan-only mode that skips execution"
      verification: "SKILL.md documents --plan-only flag behavior: produce plan, skip Phase 7 execution"
      check_method: "code-inspection"

    - id: "INV-16"
      description: "SKILL.md must handle --execute mode that reads an existing plan"
      verification: "SKILL.md documents --execute flag behavior: read existing plan file, skip Phases 1-6, proceed to Phase 7"
      check_method: "code-inspection"

    - id: "INV-17"
      description: "Compatibility layer design must be skippable when no coexistence is needed"
      verification: "Phase 4 defines a skip condition for migrations that do not require a coexistence period"
      check_method: "code-inspection"

  testable:
    - id: "INV-18"
      description: "Phase planner produces phases that each satisfy the safe stopping point invariant"
      verification: "Eval scenario verifies each phase has: compilation check, test pass requirement, and old+new coexistence statement"
      test_tag: "contract:migration:inv-18"

    - id: "INV-19"
      description: "Consumer wave grouper produces waves with no intra-wave dependencies"
      verification: "Eval scenario verifies no consumer in wave N depends on another consumer in wave N"
      test_tag: "contract:migration:inv-19"

    - id: "INV-20"
      description: "Cross-repo mode queries pathfinder and includes discovered repos in consumer registry"
      verification: "Eval scenario with --orgs flag verifies pathfinder query dispatch and cross-repo consumer inclusion"
      test_tag: "contract:migration:inv-20"

    - id: "INV-21"
      description: "Graceful degradation when pathfinder data is unavailable"
      verification: "Eval scenario without pathfinder data verifies warning message and single-repo fallback"
      test_tag: "contract:migration:inv-21"

    - id: "INV-22"
      description: "Execution phases run sequentially with full test suite verification between phases"
      verification: "Eval scenario verifies Phase 7 dispatches build per-phase with test suite gate between phases"
      test_tag: "contract:migration:inv-22"

integration_points:
  - contract: "none"
    ticket: "N/A"
    relationship: "consumes"
    surface: "crucible:cartographer (consult mode)"
    notes: "Reads cartographer map.md and module files for structural awareness in Phase 0 and blast radius mapping in Phase 2. Following the pattern at skills/cartographer-skill/SKILL.md lines 298-314."

  - contract: "none"
    ticket: "N/A"
    relationship: "consumes"
    surface: "crucible:pathfinder (query mode)"
    notes: "Queries pathfinder topology for cross-repo consumer discovery in Phase 2. Requires pathfinder to have been run against the relevant orgs. Reads from ~/.claude/memory/pathfinder/<org>/topology.json."

  - contract: "none"
    ticket: "N/A"
    relationship: "consumes"
    surface: "crucible:build (refactor mode + feature mode)"
    notes: "Delegates per-phase execution to build in Phase 7. Restructuring phases use refactor mode (skills/build/SKILL.md lines 108-596). Additive phases (add new dependency, create shim) use feature mode."

  - contract: "none"
    ticket: "N/A"
    relationship: "consumes"
    surface: "crucible:quality-gate"
    notes: "Invokes quality gate on the consolidated migration plan (artifact type: plan) and on each execution phase output (artifact type: code). Following skills/quality-gate/SKILL.md."

  - contract: "none"
    ticket: "N/A"
    relationship: "consumes"
    surface: "crucible:test-coverage"
    notes: "Invokes test-coverage audit after each execution phase to verify test alignment with migration changes. Following skills/test-coverage/SKILL.md."

  - contract: "none"
    ticket: "N/A"
    relationship: "upstream-of"
    surface: "crucible:prospector"
    notes: "Prospector discovers friction (e.g., 'outdated dependency causing coupling') and may recommend migration. /migrate accepts that recommendation and plans the transition. Prospector's output (candidate with root cause) is human-mediated input to /migrate, not a direct API call."

  - contract: "none"
    ticket: "N/A"
    relationship: "consumes"
    surface: "crucible:forge (feed-forward + retrospective)"
    notes: "Feed-forward in Phase 0 surfaces past migration lessons. Retrospective after Phase 8 captures migration outcome. Following skills/forge-skill/SKILL.md patterns."

ambiguity_resolutions:
  - id: "AMB-1"
    decision: "New skill rather than extending build's refactor mode"
    confidence: "high"
    alternatives:
      - "Add multi-phase migration awareness to build's refactor mode"
      - "Add migration phases as a planning-skill extension"
    reasoning: "Build's refactor mode handles single-phase structural changes. Migrations have a temporal dimension (coexistence periods, wave scheduling, compatibility layers) that does not map to build's task model. Adding this to build would nearly double its already 700+ line SKILL.md and conflate two distinct concerns."
    reversibility: "Low -- the skill's phase methodology and prompt templates are all new files. Merging into build later would require significant restructuring."

  - id: "AMB-2"
    decision: "Compatibility layer as explicit first-class artifact, not implicit implementation detail"
    confidence: "high"
    alternatives:
      - "Let build's implementer figure out shims as part of each phase"
      - "Generate compatibility layer code directly in the planner"
    reasoning: "Shims are the highest-risk part of any migration (temporary code that must be correct bidirectionally). Making them explicit allows quality-gate review before execution and ensures shim removal is planned as a distinct tracked phase rather than forgotten."
    reversibility: "High -- the compatibility designer prompt could be removed and shim design moved into the phase planner's scope."

  - id: "AMB-3"
    decision: "Sequential phase execution, not parallel"
    confidence: "high"
    alternatives:
      - "Allow independent phases to execute in parallel"
      - "Allow consumer waves within a phase to execute in parallel across repos"
    reasoning: "Migration phases have strict ordering requirements (shim must exist before consumers migrate, all consumers must migrate before shim is removed). Parallel execution within a consumer wave is handled by build's existing agent teams -- the migrate orchestrator does not need to manage sub-phase parallelism. Keeping phase execution sequential dramatically simplifies rollback reasoning."
    reversibility: "Medium -- adding parallelism for independent consumers within a wave would require changes to Phase 7 execution logic but not to the planning phases."

  - id: "AMB-4"
    decision: "Pathfinder degradation: warn and continue in single-repo mode, do not block"
    confidence: "high"
    alternatives:
      - "Require pathfinder data for any migration that might have cross-repo consumers"
      - "Auto-run pathfinder if topology data is missing"
    reasoning: "Many migrations are single-repo and do not need pathfinder. Blocking on pathfinder would add friction for the common case. Auto-running pathfinder is expensive (clones repos, dispatches agents) and should be a conscious user choice. Warning + single-repo fallback is the least surprising behavior."
    reversibility: "High -- adding a --require-pathfinder flag or auto-run behavior is additive."

  - id: "AMB-5"
    decision: "48-hour stale cleanup threshold for scratch directories (longer than other skills' 24 hours)"
    confidence: "medium"
    alternatives:
      - "24 hours (matching prospector and spec)"
      - "72 hours"
      - "No automatic cleanup"
    reasoning: "Migrations inherently take longer than other skill runs. A cross-repo migration may span multiple user sessions across 2 days. 24 hours risks deleting active state. 72 hours accumulates too much disk usage. 48 hours balances retention with cleanup."
    reversibility: "High -- changing the threshold is a single-line edit."
